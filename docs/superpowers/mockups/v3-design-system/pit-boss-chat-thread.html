<!DOCTYPE html>
<html lang="en" data-theme="liquid-sport">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PokerSpot · Pit Boss — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<style>
  /* SCREEN-SPECIFIC — chat thread (pit boss side) */
  .nav-back { width: 38px; height: 38px; border-radius: var(--radius-full); display: grid; place-items: center;
    color: var(--color-text); background: var(--glass-bg-regular); border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--glass-blur-thin)); text-decoration: none; flex: none; }
  .chat-peer { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .chat-peer .av { width: 38px; height: 38px; border-radius: 50%; flex: none; display: grid; place-items: center;
    font-family: var(--font-family-display); font-weight: var(--weight-black); font-size: 16px; color: var(--color-on-accent);
    background: linear-gradient(135deg, var(--color-accent-secondary), #0a84ff); }
  .chat-peer .nm { font-size: var(--type-body); font-weight: var(--weight-bold); }
  .chat-peer .st { font-size: var(--type-micro); color: var(--color-text-faint); font-weight: var(--weight-bold); }

  .chat-scroll { flex: 1; overflow-y: auto; padding: var(--space-4) var(--space-4) 84px; display: flex;
    flex-direction: column; gap: 8px; scrollbar-width: none; }
  .chat-scroll::-webkit-scrollbar { display: none; }
  .day-sep { align-self: center; font-size: var(--type-micro); font-weight: var(--weight-black); text-transform: uppercase;
    letter-spacing: var(--tracking-wide); color: var(--color-text-faint); background: var(--glass-bg-thin);
    border: 1px solid var(--glass-border); padding: 5px 12px; border-radius: 999px; margin: 4px 0; }
  .msg { max-width: 78%; display: flex; flex-direction: column; }
  .msg.in { align-self: flex-start; }
  .msg.out { align-self: flex-end; align-items: flex-end; }
  .bubble { padding: 10px 13px; border-radius: 18px; font-size: var(--type-body); line-height: 1.35; }
  .msg.in .bubble { background: var(--glass-bg-regular); border: 1px solid var(--glass-border);
    border-bottom-left-radius: 5px; color: var(--color-text); backdrop-filter: blur(var(--glass-blur-thin)); }
  .msg.out .bubble { background: var(--color-accent-primary); color: var(--color-on-accent);
    border-bottom-right-radius: 5px; font-weight: var(--weight-medium); }
  .msg .t { font-size: 10px; color: var(--color-text-faint); margin-top: 3px; }
  .typing .bubble { display: inline-flex; gap: 4px; }
  .typing .bubble i { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-faint); animation: blink 1.2s infinite; }
  .typing .bubble i:nth-child(2){animation-delay:.2s}.typing .bubble i:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,60%,100%{opacity:.25} 30%{opacity:1} }

  .composer { position: absolute; left: 0; right: 0; bottom: 0; z-index: 6; display: flex; align-items: center; gap: 8px;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); background: var(--glass-bg-thick);
    backdrop-filter: blur(var(--glass-blur-thick)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--glass-blur-thick)) saturate(var(--glass-saturate));
    border-top: 1px solid var(--glass-border); }
  .composer input { flex: 1; min-height: 42px; padding: 0 16px; border-radius: 999px; background: var(--glass-bg-thin);
    border: 1px solid var(--glass-border); color: var(--color-text); font-family: var(--font-family-body);
    font-size: var(--type-body); outline: none; }
  .composer input::placeholder { color: var(--color-text-faint); }
  .composer .send { width: 42px; height: 42px; border-radius: 50%; flex: none; border: none;
    background: var(--color-accent-primary); color: var(--color-on-accent); cursor: pointer; display: grid; place-items: center; }
  .composer .send:active { transform: scale(0.92); }
</style>
</head>
<body>
<div class="ps-phone">
  <div class="ps-statusbar">
    <span>9:41</span>
    <span class="ps-status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l1.4-1.5C14 1.5 11.4.5 8.5.5 5.6.5 3 1.5 1.1 3.4L2.5 4.9c1.6-1.5 3.7-2.4 6-2.4z"/><circle cx="8.5" cy="10" r="1.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.6" fill="currentColor"/><rect x="23" y="4" width="1.5" height="4" rx="0.75" fill="currentColor" opacity=".5"/></svg>
    </span>
  </div>

  <div class="ps-glass-nav" style="gap:10px">
    <a class="nav-back" href="pit-boss-inbox.html" aria-label="Back">
      <svg width="11" height="18" viewBox="0 0 11 18" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9.5 1.5L2 9l7.5 7.5"/></svg>
    </a>
    <div class="chat-peer">
      <div class="av" id="peerAv">G</div>
      <div><div class="nm" id="peerName">Giorgi M.</div><div class="st">Player · Royal Poker</div></div>
    </div>
  </div>

  <div class="chat-scroll" id="scroll">
    <div class="day-sep">Today</div>
    <div class="msg in"><div class="bubble">Is there a dress code tonight?</div><div class="t">22:41</div></div>
    <div class="msg out"><div class="bubble">Smart casual — no shorts or flip-flops. You're good.</div><div class="t">22:41</div></div>
    <div class="msg in"><div class="bubble">Perfect. Any chance of a 1/3 seat around 22:30?</div><div class="t">22:42</div></div>
  </div>

  <div class="composer">
    <input id="input" type="text" placeholder="Reply to player…" />
    <button class="send" id="send" aria-label="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
    </button>
  </div>

  <div class="ps-home-indicator"></div>
</div>

<script>
  const peers = { giorgi: 'Giorgi M.', nino: 'Nino K.', davit: 'Davit T.', anna: 'Anna B.' };
  const key = new URLSearchParams(location.search).get('player') || 'giorgi';
  const name = peers[key] || 'Giorgi M.';
  document.getElementById('peerName').textContent = name;
  document.getElementById('peerAv').textContent = name[0];

  const scroll = document.getElementById('scroll'), input = document.getElementById('input');
  function now() { return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
  function bottom() { scroll.scrollTop = scroll.scrollHeight; }
  function add(text, dir) {
    const m = document.createElement('div'); m.className = 'msg ' + dir;
    m.innerHTML = '<div class="bubble"></div><div class="t">' + now() + '</div>';
    m.querySelector('.bubble').textContent = text; scroll.appendChild(m); bottom();
  }
  const replies = ["Thanks!", "Sounds good 👍", "On my way.", "See you soon."];
  function send() {
    const v = input.value.trim(); if (!v) return;
    add(v, 'out'); input.value = '';
    const typing = document.createElement('div'); typing.className = 'msg in typing';
    typing.innerHTML = '<div class="bubble"><i></i><i></i><i></i></div>'; scroll.appendChild(typing); bottom();
    setTimeout(() => { typing.remove(); add(replies[Math.floor(Math.random() * replies.length)], 'in'); }, 1100);
  }
  document.getElementById('send').onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  bottom();

  window.addEventListener('message', e => {
    if (e.data && e.data.psTheme !== undefined) {
      if (e.data.psTheme) document.documentElement.setAttribute('data-theme', e.data.psTheme);
      else document.documentElement.removeAttribute('data-theme');
    }
  });
</script>
</body>
</html>
