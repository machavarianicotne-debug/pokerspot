<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<link rel="stylesheet" href="tokens.css" />

<style>
  /* SCREEN-SPECIFIC — inbox threads */
  .nav-title { font-family: var(--font-family-display); font-size: var(--type-title);
    font-weight: var(--weight-black); letter-spacing: var(--tracking-snug); }

  .thread { display: flex; align-items: center; gap: var(--space-3); padding: 13px 14px; margin-bottom: var(--space-2);
    text-decoration: none; color: inherit; }
  .thread .av { width: 46px; height: 46px; border-radius: 50%; flex: none; display: grid; place-items: center;
    font-family: var(--font-family-display); font-weight: var(--weight-black); font-size: 18px; color: var(--color-on-accent);
    background: linear-gradient(135deg, var(--color-accent-secondary), #0a84ff); }
  .thread.unseen .av { background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary)); }
  .th-main { flex: 1; min-width: 0; }
  .th-top { display: flex; align-items: baseline; gap: 8px; }
  .th-name { font-size: var(--type-body); font-weight: var(--weight-bold); }
  .th-time { margin-left: auto; font-size: var(--type-micro); color: var(--color-text-faint); font-weight: var(--weight-bold); }
  .th-preview { font-size: var(--type-subhead); color: var(--color-text-muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread.unseen .th-preview { color: var(--color-text); font-weight: var(--weight-medium); }
  .unread { flex: none; min-width: 20px; height: 20px; border-radius: 10px; background: var(--color-accent-primary);
    color: var(--color-on-accent); font-size: 11px; font-weight: var(--weight-black); display: grid; place-items: center;
    padding: 0 6px; }
  .ps-tab { position: relative; }
  .tab-badge { position: absolute; top: 2px; right: 50%; transform: translateX(20px); min-width: 17px; height: 17px;
    border-radius: 9px; background: var(--color-status-live); color: #fff; font-size: 10px; font-weight: var(--weight-black);
    display: grid; place-items: center; padding: 0 4px; }
</style>
</head>

<script>
  window.addEventListener('message', e => {
    if (e.data && e.data.psTheme !== undefined) {
      if (e.data.psTheme) document.documentElement.setAttribute('data-theme', e.data.psTheme);
      else document.documentElement.removeAttribute('data-theme');
    }
  });
</script>
