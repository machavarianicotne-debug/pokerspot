<!DOCTYPE html>
<html lang="en" data-theme="liquid-sport">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PokerSpot · Pit Boss — Player Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<style>
  /* SCREEN-SPECIFIC LAYOUT ONLY */
  .nav-title { font-family: var(--font-family-display); font-size: var(--type-title); font-weight: var(--weight-black);
    letter-spacing: var(--tracking-snug); }
  .month { display: inline-flex; align-items: center; gap: 6px; font-size: var(--type-subhead); font-weight: var(--weight-bold);
    color: var(--color-text); padding: 8px 13px; border-radius: var(--radius-full); background: var(--glass-bg-regular);
    border: 1px solid var(--glass-border); cursor: pointer; }

  .seg { display: flex; background: var(--glass-bg-regular); border: 1px solid var(--glass-border); border-radius: var(--radius-md);
    padding: 3px; margin: 4px 0 16px; }
  .seg span { flex: 1; text-align: center; padding: 10px; border-radius: var(--radius-sm); font-size: var(--type-subhead);
    font-weight: var(--weight-bold); color: var(--color-text-muted); cursor: pointer; }
  .seg span.on { background: var(--color-accent-primary); color: var(--color-on-accent); }
  .seg span .c { font-size: var(--type-micro); opacity: .8; }

  .row { display: flex; align-items: center; gap: var(--space-3); padding: 12px 14px; margin-bottom: var(--space-2); cursor: pointer; }
  .rank { width: 26px; font-family: var(--font-family-display); font-size: var(--type-headline); font-weight: var(--weight-black);
    color: var(--color-text-faint); flex: none; text-align: center; }
  .row:nth-child(1) .rank, .row.top1 .rank { color: var(--color-accent-primary); }
  .av { width: 40px; height: 40px; border-radius: 50%; flex: none; display: grid; place-items: center;
    font-family: var(--font-family-display); font-weight: var(--weight-black); font-size: 15px; color: var(--color-on-accent);
    background: linear-gradient(135deg, var(--color-accent-secondary), #0a84ff); }
  .row.walk .av { background: var(--glass-bg-regular); color: var(--color-text-muted); border: 1.5px dashed var(--glass-border); }
  .r-main { flex: 1; min-width: 0; }
  .r-name { font-size: var(--type-body); font-weight: var(--weight-bold); }
  .r-sub { font-size: var(--type-caption); color: var(--color-text-muted); margin-top: 2px; }
  .r-hrs { font-family: var(--font-family-display); font-size: var(--type-headline); font-weight: var(--weight-black);
    color: var(--color-accent-primary); font-variant-numeric: tabular-nums; }

  .ov { position: absolute; inset: 0; z-index: 10; background: var(--color-bg-0); display: none; flex-direction: column; }
  .ov.show { display: flex; }
  .ov-head { display: flex; align-items: center; gap: var(--space-3); padding: 16px; border-bottom: 1px solid var(--glass-border); }
  .ov-head .x { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass-bg-regular);
    color: var(--color-text); cursor: pointer; display: grid; place-items: center; }
  .ov-head .ft { font-family: var(--font-family-display); font-size: var(--type-headline); font-weight: var(--weight-black); }
  .ov-body { flex: 1; overflow-y: auto; padding: 18px 16px; scrollbar-width: none; }
  .ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-5); }
  .stat { padding: 14px; border-radius: var(--radius-md); background: var(--glass-bg-thin); border: 1px solid var(--glass-border); }
  .stat .v { font-family: var(--font-family-display); font-size: var(--type-title); font-weight: var(--weight-black); }
  .stat .k { font-size: var(--type-micro); font-weight: var(--weight-black); letter-spacing: var(--tracking-wide); text-transform: uppercase;
    color: var(--color-text-faint); margin-top: 6px; }
  .sess { display: flex; padding: 11px 0; border-top: 1px solid var(--glass-border); font-size: var(--type-subhead); }
  .sess .d { color: var(--color-text-muted); } .sess .dur { margin-left: auto; font-weight: var(--weight-bold); }

  .ps-tab svg { width: 21px; height: 21px; }
</style>
</head>
<body>
<div class="ps-phone">
  <div class="ps-statusbar">
    <span>9:41</span>
    <span class="ps-status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l1.4-1.5C14 1.5 11.4.5 8.5.5 5.6.5 3 1.5 1.1 3.4L2.5 4.9c1.6-1.5 3.7-2.4 6-2.4z"/><circle cx="8.5" cy="10" r="1.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.6" fill="currentColor"/><rect x="23" y="4" width="1.5" height="4" rx="0.75" fill="currentColor" opacity=".5"/></svg>
    </span>
  </div>

  <div class="ps-glass-nav"><span class="nav-title">Player Stats</span>
    <span class="month" id="month">May 2026 ▾</span></div>

  <div class="ps-screen">
    <div class="seg" id="tabs">
      <span class="on" data-t="reg">Registered <span class="c" id="cReg"></span></span>
      <span data-t="walk">Walk-in <span class="c" id="cWalk"></span></span>
    </div>
    <div id="list"></div>
  </div>

  <!-- player detail -->
  <div class="ov" id="ov">
    <div class="ov-head"><button class="x" id="ovClose">✕</button><span class="ft" id="ovName">Player</span></div>
    <div class="ov-body" id="ovBody"></div>
  </div>

  <div class="ps-tabbar">
    <a class="ps-tab" href="pit-boss-live-floor.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>Floor</a>
    <a class="ps-tab" href="pit-boss-inbox.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 0 1-12 7.7L3 21l1.8-6A8.5 8.5 0 1 1 21 11.5z"/></svg>Inbox</a>
    <div class="ps-tab is-active"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="12" width="5" height="9" rx="1"/><rect x="10" y="7" width="5" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>Stats</div>
    <a class="ps-tab" href="pit-boss-settings.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>Settings</a>
  </div>
  <div class="ps-home-indicator"></div>
</div>

<script>
  function mk(name, hrs, sessions) { return { name, hrs, sessions }; }
  const REG = [mk('Cotne M.', 47.3, 22), mk('Saba L.', 39.1, 18), mk('Nino K.', 31.8, 15), mk('Davit T.', 28.4, 12),
    mk('Mariam G.', 24.0, 14), mk('Irakli D.', 19.6, 9), mk('Anna B.', 17.2, 8), mk('Luka P.', 12.5, 6), mk('Tamar Kh.', 8.1, 4)]
    .sort((a, b) => b.hrs - a.hrs);
  const WALK = [mk('Beka', 14.2, 5), mk('Levan', 9.7, 4), mk('Giorgi (corner)', 6.3, 3), mk('Niko', 3.1, 2)]
    .sort((a, b) => b.hrs - a.hrs);

  document.getElementById('cReg').textContent = '· ' + REG.length;
  document.getElementById('cWalk').textContent = '· ' + WALK.length;

  let tab = 'reg';
  const listEl = document.getElementById('list');
  function render() {
    const data = tab === 'reg' ? REG : WALK;
    listEl.innerHTML = '';
    data.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'ps-card row' + (tab === 'walk' ? ' walk' : '') + (i === 0 ? ' top1' : '');
      el.innerHTML = '<span class="rank">' + (i + 1) + '</span><span class="av">' + p.name[0] + '</span>' +
        '<div class="r-main"><div class="r-name">' + p.name + '</div><div class="r-sub">' + p.sessions + ' sessions · avg ' + (p.hrs / p.sessions).toFixed(1) + 'h</div></div>' +
        '<span class="r-hrs">' + p.hrs.toFixed(1) + 'h</span>';
      el.onclick = () => openPlayer(p);
      listEl.appendChild(el);
    });
  }
  function openPlayer(p) {
    document.getElementById('ovName').textContent = p.name;
    let sessions = '';
    const days = ['May 22', 'May 20', 'May 18', 'May 15', 'May 12'];
    for (let i = 0; i < Math.min(5, p.sessions); i++)
      sessions += '<div class="sess"><span class="d">' + days[i] + ' · Table ' + ((i % 3) + 1) + ' · 1/3 NLH</span><span class="dur">' + (1 + Math.floor(Math.random() * 4)) + 'h ' + (Math.floor(Math.random() * 59)) + 'm</span></div>';
    document.getElementById('ovBody').innerHTML =
      '<div class="ov-grid"><div class="stat"><div class="v">' + p.hrs.toFixed(1) + 'h</div><div class="k">This month</div></div>' +
      '<div class="stat"><div class="v">' + p.sessions + '</div><div class="k">Sessions</div></div></div>' +
      '<div style="font-size:var(--type-micro);font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-faint);margin-bottom:4px">Recent sessions</div>' + sessions;
    document.getElementById('ov').classList.add('show');
  }
  document.getElementById('ovClose').onclick = () => document.getElementById('ov').classList.remove('show');
  document.querySelectorAll('#tabs span').forEach(s => s.onclick = () => {
    document.querySelectorAll('#tabs span').forEach(o => o.classList.remove('on')); s.classList.add('on'); tab = s.dataset.t; render();
  });
  document.getElementById('month').onclick = () => alert('Month picker — April / May / June 2026');
  render();

  window.addEventListener('message', e => {
    if (e.data && e.data.psTheme !== undefined) {
      if (e.data.psTheme) document.documentElement.setAttribute('data-theme', e.data.psTheme);
      else document.documentElement.removeAttribute('data-theme');
    }
  });
</script>
</body>
</html>
