<!DOCTYPE html>
<html lang="en" data-theme="liquid-sport">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PokerSpot · Profile (tokens)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<style>
  /* SCREEN-SPECIFIC LAYOUT ONLY */
  .nav-title { font-family: var(--font-family-display); font-size: var(--type-title);
    font-weight: var(--weight-black); letter-spacing: var(--tracking-snug); }

  .phead { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-2) 4px var(--space-6); }
  .phead .av-lg { width: 64px; height: 64px; border-radius: var(--radius-full); display: grid; place-items: center;
    font-family: var(--font-family-display); font-weight: var(--weight-black); font-size: 26px;
    color: var(--color-on-accent); background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));
    box-shadow: var(--elevation-2); }
  .phead .pn { font-family: var(--font-family-display); font-size: var(--type-title); font-weight: var(--weight-black); }
  .phead .pp { font-size: var(--type-body); color: var(--color-text-muted); margin-top: 2px; }

  .sgroup { background: var(--glass-bg-thin); border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    overflow: hidden; margin-bottom: var(--space-5);
    backdrop-filter: blur(var(--glass-blur-regular)); -webkit-backdrop-filter: blur(var(--glass-blur-regular)); }
  .srow { display: flex; align-items: center; gap: var(--space-3); padding: 14px 16px; min-height: 56px; }
  .srow + .srow { border-top: 1px solid var(--glass-border); }
  .srow .lbl { font-size: var(--type-body); font-weight: var(--weight-medium); }
  .srow .val { margin-left: auto; display: flex; align-items: center; gap: 8px;
    font-size: var(--type-body); color: var(--color-text-muted); }
  .srow.tappable { cursor: pointer; }
  .srow.tappable:active { background: var(--glass-bg-thin); }
  .srow .chev { color: var(--color-text-faint); }

  .lang-mini { display: flex; gap: 6px; margin-left: auto; }
  .lang-mini span { padding: 6px 11px; border-radius: var(--radius-full); font-size: var(--type-caption);
    font-weight: var(--weight-bold); color: var(--color-text-muted); background: var(--glass-bg-regular);
    border: 1px solid var(--glass-border); cursor: pointer; }
  .lang-mini span.on { color: var(--color-accent-primary);
    border-color: var(--color-accent-primary); background: color-mix(in srgb, var(--color-accent-primary) 12%, transparent); }

  .gh { font-size: var(--type-micro); font-weight: var(--weight-black); letter-spacing: var(--tracking-overline);
    text-transform: uppercase; color: var(--color-text-faint); margin: 0 4px var(--space-2); }

  .actions { display: flex; flex-direction: column; gap: var(--space-3); margin-top: var(--space-2); }
  .actions .ps-btn { width: 100%; }
  .ps-btn--danger { background: transparent; color: var(--color-status-live);
    border-color: color-mix(in srgb, var(--color-status-live) 50%, transparent); }
  .danger-note { font-size: var(--type-caption); color: var(--color-text-faint); text-align: center;
    margin-top: var(--space-2); line-height: 1.4; }
</style>
</head>
<body>
<div class="ps-phone">
  <div class="ps-statusbar">
    <span>9:41</span>
    <span class="ps-status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l1.4-1.5C14 1.5 11.4.5 8.5.5 5.6.5 3 1.5 1.1 3.4L2.5 4.9c1.6-1.5 3.7-2.4 6-2.4z"/><circle cx="8.5" cy="10" r="1.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.6" fill="currentColor"/><rect x="23" y="4" width="1.5" height="4" rx="0.75" fill="currentColor" opacity=".5"/></svg>
    </span>
  </div>

  <div class="ps-glass-nav">
    <span class="nav-title">Profile</span>
  </div>

  <div class="ps-screen">
    <div class="phead">
      <div class="av-lg" id="avatar">SZ</div>
      <div><div class="pn" id="pname">Sandro Z.</div><div class="pp">+995 599 12 34 56</div></div>
    </div>

    <div class="gh">Account</div>
    <div class="sgroup">
      <div class="srow tappable" id="editName">
        <span class="lbl">Display name</span>
        <span class="val"><span id="nameVal">Sandro Z.</span>
          <svg class="chev" width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1.5 1.5L7 7.5 1.5 13.5"/></svg></span>
      </div>
      <div class="srow">
        <span class="lbl">Phone</span>
        <span class="val">+995 599 12 34 56</span>
      </div>
      <div class="srow">
        <span class="lbl">Language</span>
        <div class="lang-mini" id="lang">
          <span data-l="ka">ქა</span><span class="on" data-l="en">EN</span><span data-l="ru">РУ</span>
        </div>
      </div>
    </div>

    <div class="gh">Notifications</div>
    <div class="sgroup">
      <div class="srow">
        <span class="lbl">Seat called</span>
        <label class="ps-toggle" style="margin-left:auto"><input type="checkbox" checked /><span class="track"></span></label>
      </div>
      <div class="srow">
        <span class="lbl">Reservation updates</span>
        <label class="ps-toggle" style="margin-left:auto"><input type="checkbox" checked /><span class="track"></span></label>
      </div>
      <div class="srow">
        <span class="lbl">Club news</span>
        <label class="ps-toggle" style="margin-left:auto"><input type="checkbox" /><span class="track"></span></label>
      </div>
    </div>

    <div class="gh">Session</div>
    <div class="actions">
      <button class="ps-btn ps-btn--secondary" id="logout">Log out</button>
      <button class="ps-btn ps-btn--danger" id="del">Delete account</button>
      <div class="danger-note">Deleting removes your data permanently and cannot be undone.</div>
    </div>
  </div>

  <div class="ps-tabbar">
    <a class="ps-tab" href="player-clubs-list.html" style="text-decoration:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-2.5 4-6 6.2-6 9.7A6 6 0 0 0 12 18a6 6 0 0 0 6-6.3C18 8.2 14.5 6 12 2z"/></svg>Clubs</a>
    <a class="ps-tab" href="my-status.html" style="text-decoration:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Activity</a>
    <div class="ps-tab is-active"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>Profile</div>
  </div>
  <div class="ps-home-indicator"></div>
</div>

<script>
  // edit display name (mock)
  document.getElementById('editName').addEventListener('click', () => {
    const cur = document.getElementById('nameVal').textContent;
    const v = window.prompt('Display name', cur);
    if (v && v.trim().length >= 2) {
      document.getElementById('nameVal').textContent = v.trim();
      document.getElementById('pname').textContent = v.trim();
      document.getElementById('avatar').textContent =
        v.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }
  });

  // language
  document.querySelectorAll('#lang span').forEach(s => s.addEventListener('click', () => {
    document.querySelectorAll('#lang span').forEach(o => o.classList.remove('on'));
    s.classList.add('on');
  }));

  document.getElementById('logout').addEventListener('click', () => {
    if (window.confirm('Log out of PokerSpot?')) window.location.href = 'onboarding-welcome.html';
  });

  document.getElementById('del').addEventListener('click', () => {
    if (window.confirm('Delete your account?\n\nThis permanently removes your profile, waitlists, and reservations. This cannot be undone.')) {
      window.alert('Account deleted.');
      window.location.href = 'onboarding-welcome.html';
    }
  });

  window.addEventListener('message', e => {
    if (e.data && e.data.psTheme !== undefined) {
      if (e.data.psTheme) document.documentElement.setAttribute('data-theme', e.data.psTheme);
      else document.documentElement.removeAttribute('data-theme');
    }
  });
</script>
</body>
</html>
