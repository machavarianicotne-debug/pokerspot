<!DOCTYPE html>
<html lang="en" data-theme="liquid-sport">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PokerSpot · Super Admin — Users</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<style>
  /* SCREEN-SPECIFIC LAYOUT ONLY */
  .nav-title { font-family: var(--font-family-display); font-size: var(--type-title); font-weight: var(--weight-black);
    letter-spacing: var(--tracking-snug); }

  .search { display: flex; align-items: center; gap: 8px; height: 44px; padding: 0 14px; border-radius: var(--radius-md);
    background: var(--glass-bg-thin); border: 1px solid var(--glass-border); margin-bottom: var(--space-3); }
  .search svg { color: var(--color-text-faint); }
  .search input { flex: 1; background: transparent; border: none; outline: none; color: var(--color-text);
    font-family: var(--font-family-body); font-size: var(--type-body); }
  .search input::placeholder { color: var(--color-text-faint); }

  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: var(--space-4); }
  .seg { display: flex; background: var(--glass-bg-regular); border: 1px solid var(--glass-border); border-radius: var(--radius-md);
    padding: 3px; flex: 1; overflow-x: auto; scrollbar-width: none; }
  .seg::-webkit-scrollbar { display: none; }
  .seg span { flex: 1; white-space: nowrap; text-align: center; padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: var(--type-caption); font-weight: var(--weight-bold); color: var(--color-text-muted); cursor: pointer; }
  .seg span.on { background: var(--color-accent-primary); color: var(--color-on-accent); }
  .sortbtn { flex: none; padding: 9px 12px; border-radius: var(--radius-md); background: var(--glass-bg-regular);
    border: 1px solid var(--glass-border); color: var(--color-text); font-size: var(--type-caption); font-weight: var(--weight-bold);
    cursor: pointer; white-space: nowrap; }

  .u-item { display: flex; align-items: center; gap: var(--space-3); padding: 11px 14px; margin-bottom: var(--space-2); cursor: pointer; }
  .u-av { width: 42px; height: 42px; border-radius: 50%; flex: none; display: grid; place-items: center;
    font-family: var(--font-family-display); font-weight: var(--weight-black); font-size: 16px; color: var(--color-on-accent);
    background: linear-gradient(135deg, var(--color-accent-secondary), #0a84ff); }
  .u-item.pitboss .u-av { background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary)); }
  .u-item.superadmin .u-av { background: linear-gradient(135deg, #b48cff, #638cff); }
  .u-item.blocked { opacity: .5; }
  .u-main { flex: 1; min-width: 0; }
  .u-name { font-size: var(--type-body); font-weight: var(--weight-bold); }
  .u-sub { font-size: var(--type-caption); color: var(--color-text-muted); margin-top: 2px; }
  .u-role { font-size: var(--type-micro); font-weight: var(--weight-black); text-transform: uppercase; letter-spacing: var(--tracking-wide);
    padding: 3px 8px; border-radius: var(--radius-sm); flex: none; }
  .u-role.player { color: var(--color-accent-secondary); background: color-mix(in srgb, var(--color-accent-secondary) 14%, transparent); }
  .u-role.pitboss { color: var(--color-accent-primary); background: color-mix(in srgb, var(--color-accent-primary) 14%, transparent); }
  .u-role.superadmin { color: #b48cff; background: rgba(180,140,255,0.16); }
  .empty { text-align: center; color: var(--color-text-faint); padding: var(--space-8); font-style: italic; }

  /* detail overlay */
  .ov { position: absolute; inset: 0; z-index: 10; background: var(--color-bg-0); display: none; flex-direction: column; }
  .ov.show { display: flex; }
  .ov-head { display: flex; align-items: center; gap: var(--space-3); padding: 16px; border-bottom: 1px solid var(--glass-border); }
  .ov-head .x { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass-bg-regular);
    color: var(--color-text); cursor: pointer; display: grid; place-items: center; }
  .ov-head .ft { font-family: var(--font-family-display); font-size: var(--type-headline); font-weight: var(--weight-black); }
  .ov-body { flex: 1; overflow-y: auto; padding: 20px 16px; scrollbar-width: none; }
  .ov-body::-webkit-scrollbar { display: none; }
  .ov-prof { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-5); }
  .ov-prof .av { width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center;
    font-family: var(--font-family-display); font-weight: var(--weight-black); font-size: 26px; color: var(--color-on-accent);
    background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary)); }
  .ov-prof .pn { font-family: var(--font-family-display); font-size: var(--type-title); font-weight: var(--weight-black); }
  .ov-prof .pp { font-size: var(--type-body); color: var(--color-text-muted); margin-top: 2px; }
  .ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-5); }
  .stat { padding: 14px; border-radius: var(--radius-md); background: var(--glass-bg-thin); border: 1px solid var(--glass-border); }
  .stat .v { font-family: var(--font-family-display); font-size: var(--type-title); font-weight: var(--weight-black); }
  .stat .k { font-size: var(--type-micro); font-weight: var(--weight-black); letter-spacing: var(--tracking-wide); text-transform: uppercase;
    color: var(--color-text-faint); margin-top: 6px; }
  .ov-row { display: flex; padding: 11px 0; border-top: 1px solid var(--glass-border); font-size: var(--type-body); }
  .ov-row .k { color: var(--color-text-muted); } .ov-row .v { margin-left: auto; font-weight: var(--weight-bold); }
  .block-btn { width: 100%; padding: 13px; border-radius: var(--radius-md); border: 1px solid color-mix(in srgb, var(--color-status-live) 50%, transparent);
    background: none; color: var(--color-status-live); font-weight: var(--weight-bold); cursor: pointer; margin-top: var(--space-5); }

  .ps-tab { font-size: 9.5px; }
  .ps-tab svg { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="ps-phone">
  <div class="ps-statusbar">
    <span>9:41</span>
    <span class="ps-status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l1.4-1.5C14 1.5 11.4.5 8.5.5 5.6.5 3 1.5 1.1 3.4L2.5 4.9c1.6-1.5 3.7-2.4 6-2.4z"/><circle cx="8.5" cy="10" r="1.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.6" fill="currentColor"/><rect x="23" y="4" width="1.5" height="4" rx="0.75" fill="currentColor" opacity=".5"/></svg>
    </span>
  </div>

  <div class="ps-glass-nav"><span class="nav-title">Users</span><span class="ps-avatar">SA</span></div>

  <div class="ps-screen">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="text" placeholder="Search name or phone…" />
    </div>
    <div class="controls">
      <div class="seg" id="filter"><span class="on" data-f="all">All</span><span data-f="player">Players</span><span data-f="pitboss">Pit Bosses</span><span data-f="superadmin">Admins</span></div>
      <button class="sortbtn" id="sort">Newest ▾</button>
    </div>
    <div id="list"></div>
  </div>

  <!-- detail overlay -->
  <div class="ov" id="ov">
    <div class="ov-head"><button class="x" id="ovClose">✕</button><span class="ft">User profile</span></div>
    <div class="ov-body" id="ovBody"></div>
  </div>

  <div class="ps-tabbar">
    <a class="ps-tab" href="super-admin-dashboard.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="5" height="9" rx="1"/><rect x="10" y="7" width="5" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>Dashboard</a>
    <a class="ps-tab" href="super-admin-clubs-crud.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V7l6-4 6 4v14M9 21v-6h6v6M15 10h6v11"/></svg>Clubs</a>
    <a class="ps-tab" href="super-admin-assign-pitboss.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><circle cx="17" cy="9" r="2.5"/><path d="M3 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5M15.5 20c0-2 1-3.5 3-3.5"/></svg>Pit Bosses</a>
    <div class="ps-tab is-active"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="7" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>Users</div>
    <a class="ps-tab" href="super-admin-settings.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>Settings</a>
  </div>
  <div class="ps-home-indicator"></div>
</div>

<script>
  const CLUBS = ['Royal Poker Tbilisi', 'Bellagio Batumi', 'Shangri La Tbilisi'];
  const FN = ['Giorgi', 'Nino', 'Davit', 'Anna', 'Luka', 'Mariam', 'Saba', 'Tamar', 'Irakli', 'Salome', 'Beka', 'Nika', 'Dato', 'Elene', 'Cotne', 'Mari', 'Levan', 'Ana'];
  const LN = ['M.', 'K.', 'T.', 'B.', 'P.', 'G.', 'L.', 'R.', 'Ch.', 'D.'];
  function rnd(a) { return a[Math.floor(Math.random() * a.length)]; }
  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  // build ~26 mock users
  const users = [];
  users.push({ name: 'Sandro Z.', role: 'superadmin', phone: '+995 599 00 11 22', reg: '2026-01-04', sessions: 0, mins: 0, last: 'now', blocked: false });
  ['Giorgi M.', 'Nika R.', 'Dato L.'].forEach((n, i) => users.push({ name: n, role: 'pitboss', club: CLUBS[i], phone: '+995 5' + (77 + i) + ' ' + (10 + i) + ' 34 56', reg: '2026-0' + (2 + i) + '-1' + i, sessions: 0, mins: 0, last: pad(i + 1) + 'h ago', blocked: false }));
  for (let i = 0; i < 22; i++) {
    const sessions = Math.floor(Math.random() * 40) + 1;
    users.push({
      name: rnd(FN) + ' ' + rnd(LN), role: 'player',
      phone: '+995 5' + (90 + Math.floor(Math.random() * 9)) + ' ' + pad(Math.floor(Math.random() * 99)) + ' ' + pad(Math.floor(Math.random() * 99)) + ' ' + pad(Math.floor(Math.random() * 99)),
      reg: '2026-0' + (Math.floor(Math.random() * 4) + 1) + '-' + pad(Math.floor(Math.random() * 27) + 1),
      sessions, mins: sessions * (Math.floor(Math.random() * 120) + 60),
      last: rnd(['2h ago', '5h ago', '1d ago', '3d ago', '1w ago']), blocked: Math.random() < 0.08
    });
  }

  let filter = 'all', sort = 'newest', query = '';
  const listEl = document.getElementById('list');

  function fmtHrs(m) { return (m / 60).toFixed(1) + 'h'; }
  function relDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

  function render() {
    let rows = users.filter(u =>
      (filter === 'all' || u.role === filter) &&
      (u.name.toLowerCase().includes(query) || u.phone.replace(/\s/g, '').includes(query.replace(/\s/g, ''))));
    rows.sort((a, b) => sort === 'newest' ? new Date(b.reg) - new Date(a.reg) : b.sessions - a.sessions);
    if (!rows.length) { listEl.innerHTML = '<div class="empty">No users match.</div>'; return; }
    listEl.innerHTML = '';
    rows.forEach(u => {
      const roleLabel = u.role === 'pitboss' ? 'Pit Boss' : u.role === 'superadmin' ? 'Admin' : 'Player';
      const sub = u.phone + ' · joined ' + relDate(u.reg);
      const el = document.createElement('div');
      el.className = 'ps-card u-item ' + u.role + (u.blocked ? ' blocked' : '');
      el.innerHTML =
        '<div class="u-av">' + u.name[0] + '</div>' +
        '<div class="u-main"><div class="u-name">' + u.name + (u.blocked ? ' 🚫' : '') + '</div><div class="u-sub">' + sub + '</div></div>' +
        '<span class="u-role ' + u.role + '">' + roleLabel + '</span>';
      el.onclick = () => openUser(u);
      listEl.appendChild(el);
    });
  }

  function openUser(u) {
    const body = document.getElementById('ovBody');
    let extra = '';
    if (u.role === 'player') {
      extra =
        '<div class="ov-grid"><div class="stat"><div class="v">' + u.sessions + '</div><div class="k">Sessions</div></div>' +
        '<div class="stat"><div class="v">' + fmtHrs(u.mins) + '</div><div class="k">Total playtime</div></div></div>';
    } else if (u.role === 'pitboss') {
      extra = '<div class="ov-row"><span class="k">Assigned club</span><span class="v">' + u.club + '</span></div>' +
        '<div class="ov-row"><span class="k">Assignment history</span><span class="v">1 club · since ' + relDate(u.reg) + '</span></div>';
    }
    body.innerHTML =
      '<div class="ov-prof"><div class="av">' + u.name[0] + '</div><div><div class="pn">' + u.name + '</div>' +
        '<div class="pp">' + (u.role === 'pitboss' ? 'Pit Boss · ' + u.club : u.role === 'superadmin' ? 'Super Admin · Owner' : 'Player') + '</div></div></div>' +
      '<div class="ov-row"><span class="k">Phone</span><span class="v">' + u.phone + '</span></div>' +
      '<div class="ov-row"><span class="k">Registered</span><span class="v">' + relDate(u.reg) + '</span></div>' +
      '<div class="ov-row"><span class="k">Last seen</span><span class="v">' + u.last + '</span></div>' +
      extra +
      (u.role === 'superadmin' ? '' : '<button class="block-btn" id="blockBtn">' + (u.blocked ? 'Unblock user' : 'Block user') + '</button>');
    document.getElementById('ov').classList.add('show');
    const bb = document.getElementById('blockBtn');
    if (bb) bb.onclick = () => {
      if (confirm((u.blocked ? 'Unblock' : 'Block') + ' ' + u.name + '?')) {
        u.blocked = !u.blocked; document.getElementById('ov').classList.remove('show'); render();
      }
    };
  }
  document.getElementById('ovClose').onclick = () => document.getElementById('ov').classList.remove('show');

  document.querySelectorAll('#filter span').forEach(s => s.onclick = () => {
    document.querySelectorAll('#filter span').forEach(o => o.classList.remove('on')); s.classList.add('on');
    filter = s.dataset.f; render();
  });
  document.getElementById('sort').onclick = function () {
    sort = sort === 'newest' ? 'active' : 'newest';
    this.textContent = (sort === 'newest' ? 'Newest' : 'Most active') + ' ▾'; render();
  };
  document.getElementById('q').addEventListener('input', e => { query = e.target.value.toLowerCase(); render(); });
  render();

  window.addEventListener('message', e => {
    if (e.data && e.data.psTheme !== undefined) {
      if (e.data.psTheme) document.documentElement.setAttribute('data-theme', e.data.psTheme);
      else document.documentElement.removeAttribute('data-theme');
    }
  });
</script>
</body>
</html>
