# Codemagic CI — build the iOS app on a cloud Mac (no Mac needed) and ship it to
# TestFlight, so you can install on your iPhone. Windows users build iOS this way.
#
# One-time setup in Codemagic (codemagic.io):
#   1. Connect this Git repo.
#   2. Team → Integrations → App Store Connect: add an App Store Connect API key
#      (App Store Connect → Users and Access → Integrations → create key). Note
#      the key id, issuer id, and upload the .p8.
#   3. Reference that integration name below (APP_STORE_CONNECT_KEY) and set the
#      bundle id. Codemagic auto-manages signing certificates/profiles from the key.
#   4. Register bundle id com.pokerspot.pokerspot as an App in App Store Connect.
#
# Then: start a build → it compiles on macOS, signs, and uploads to TestFlight.
# Install the TestFlight app on your iPhone and accept the build.

workflows:
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: APP_STORE_CONNECT_KEY # ← the integration name you created
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pokerspot.pokerspot
      vars:
        BUNDLE_ID: com.pokerspot.pokerspot
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
