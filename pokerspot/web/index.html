<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pokerspot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>pokerspot</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    Plan 7: the service worker is ENABLED (offline caching + fast repeat loads).
    flutter_bootstrap.js registers flutter_service_worker.js. To avoid the
    stale-build trap, we show an "update available" toast when a new worker has
    installed, tell it to skipWaiting, and reload once it takes control.
    (Hosting also serves entry files with Cache-Control: no-cache as a backstop.)
  -->
  <style>
    #ps-update-toast {
      position: fixed; left: 16px; right: 16px; bottom: 16px; z-index: 99999;
      max-width: 420px; margin: 0 auto; display: none; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 18px; font-family: -apple-system, "Inter", sans-serif;
      color: #ECFBFF; background: rgba(8,30,32,0.92); border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 22px 40px -22px rgba(0,0,0,0.85);
    }
    #ps-update-toast span { flex: 1; font-size: 14px; font-weight: 600; }
    #ps-update-toast button {
      border: 0; cursor: pointer; padding: 9px 15px; border-radius: 999px;
      font-weight: 800; font-size: 13px; color: #06241A; background: #C6FF3A;
    }
  </style>
  <div id="ps-update-toast" role="alert">
    <span>New version available</span>
    <button id="ps-update-reload" type="button">Reload</button>
  </div>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
      function showToast(waiting) {
        var toast = document.getElementById('ps-update-toast');
        var btn = document.getElementById('ps-update-reload');
        if (!toast || !btn) return;
        toast.style.display = 'flex';
        btn.onclick = function () {
          // Flutter's generated SW skips waiting on the literal 'skipWaiting' message.
          if (waiting) waiting.postMessage('skipWaiting');
          else window.location.reload();
        };
      }
      // flutter_bootstrap.js registers the SW; hook the registration once active.
      navigator.serviceWorker.ready.then(function (reg) {
        if (reg.waiting && navigator.serviceWorker.controller) showToast(reg.waiting);
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showToast(reg.waiting || nw);
            }
          });
        });
      }).catch(function () {});
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
