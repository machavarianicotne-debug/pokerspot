<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pokerspot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>pokerspot</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    MVP / pilot: the service worker is DISABLED so every visit loads the freshly
    deployed build. Flutter's default SW uses stale-while-revalidate, which made
    returning users see the *previous* build on first revisit (old onboarding /
    "Player coming soon"). Cost: ~300ms on repeat loads. Reversible.
    TODO(Plan 7+): re-enable proper caching with an "update available — refresh" UX.
  -->
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        // 1) Unregister any SW from a previous build (otherwise cached users are
        //    stuck on the old SW forever).
        navigator.serviceWorker.getRegistrations()
          .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
          .catch(function () {});
        // 2) Drop Flutter's caches.
        if (window.caches && caches.keys) {
          caches.keys()
            .then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); })
            .catch(function () {});
        }
        // 3) Prevent flutter_bootstrap.js from registering a new SW.
        navigator.serviceWorker.register = function () {
          return Promise.reject(new Error('Service worker disabled for MVP.'));
        };
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
