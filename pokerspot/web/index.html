<!DOCTYPE html>
<html>
<head>
  <!--

    The path provided below has to start and end with a slash "/" in order for

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pokerspot">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>pokerspot</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    Plan 7: the service worker is ENABLED (offline caching + fast repeat loads).
    flutter_bootstrap.js registers flutter_service_worker.js. To avoid the
    stale-build trap, a newly-installed worker is activated AUTOMATICALLY
    (skipWaiting) and the page reloads once it takes control — so a plain
    refresh always lands on the latest deploy, with no toast, no incognito and
    no manual cache clearing. (Hosting also serves entry files with
    Cache-Control: no-cache as a backstop.)
  -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
      // Flutter's generated SW skips waiting on the literal 'skipWaiting' message.
      function activate(worker) {
        if (worker) worker.postMessage('skipWaiting');
      }
      // flutter_bootstrap.js registers the SW; auto-activate any update so the
      // controllerchange handler above reloads straight onto the new build.
      navigator.serviceWorker.ready.then(function (reg) {
        if (reg.waiting && navigator.serviceWorker.controller) activate(reg.waiting);
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              activate(reg.waiting || nw);
            }
          });
        });
      }).catch(function () {});
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
